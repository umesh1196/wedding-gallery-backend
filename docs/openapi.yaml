openapi: 3.0.3
info:
  title: Wedding Gallery Backend API
  version: 0.1.0
  description: |
    Swagger-style API contract for the currently available endpoints in this app.
    The request and response examples below reflect the existing implementation.
servers:
  - url: http://127.0.0.1:3000
    description: Local development
tags:
  - name: Health
  - name: Auth
  - name: Studio
  - name: Weddings
  - name: Ceremonies
  - name: Photos
  - name: Storage Connections
  - name: Upload Batches
paths:
  /health:
    get:
      tags:
        - Health
      summary: App health check
      operationId: healthCheck
      responses:
        "200":
          description: App is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok

  /up:
    get:
      tags:
        - Health
      summary: Rails health check
      operationId: railsHealthCheck
      responses:
        "200":
          description: Rails is healthy
          content:
            text/html:
              schema:
                type: string
              example: "<!DOCTYPE html><html><body style=\"background-color: green\"></body></html>"

  /api/v1/auth/signup:
    post:
      tags:
        - Auth
      summary: Create a studio account
      operationId: signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - studio
              properties:
                studio:
                  $ref: "#/components/schemas/SignupRequestStudio"
            example:
              studio:
                email: live-test-20260407@studio.com
                password: pass1234
                studio_name: My Studio
      responses:
        "201":
          description: Studio created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
              example:
                success: true
                data:
                  token: eyJhbGciOiJIUzI1NiJ9.example
                  studio:
                    id: b3d7cb31-4dae-4faf-9690-5335408926c5
                    email: live-test-20260407@studio.com
                    phone: null
                    plan: free
                    plan_expires_at: null
                    slug: my-studio-1
                    studio_name: My Studio
        "400":
          description: Missing required request params
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                error:
                  message: "param is missing or the value is empty: studio"
                  code: bad_request
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                error:
                  message: Email has already been taken
                  code: validation_error

  /api/v1/auth/login:
    post:
      tags:
        - Auth
      summary: Authenticate a studio
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - studio
              properties:
                studio:
                  $ref: "#/components/schemas/LoginRequestStudio"
            example:
              studio:
                email: live-test-20260407@studio.com
                password: pass1234
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
              example:
                success: true
                data:
                  token: eyJhbGciOiJIUzI1NiJ9.example
                  studio:
                    id: b3d7cb31-4dae-4faf-9690-5335408926c5
                    email: live-test-20260407@studio.com
                    phone: null
                    plan: free
                    plan_expires_at: null
                    slug: my-studio-1
                    studio_name: My Studio
        "400":
          description: Missing required request params
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                error:
                  message: "param is missing or the value is empty: studio"
                  code: bad_request
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                error:
                  message: Invalid email or password
                  code: invalid_credentials

  /api/v1/auth/me:
    get:
      tags:
        - Auth
      summary: Fetch the current authenticated studio
      operationId: currentStudio
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current studio profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeSuccessResponse"
              example:
                success: true
                data:
                  id: b3d7cb31-4dae-4faf-9690-5335408926c5
                  email: live-test-20260407@studio.com
                  phone: null
                  plan: free
                  plan_expires_at: null
                  slug: my-studio-1
                  studio_name: My Studio
        "401":
          description: Missing, invalid, or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                error:
                  message: Unauthorized
                  code: unauthorized

  /api/v1/studio:
    patch:
      tags:
        - Studio
      summary: Update the current studio profile and branding
      operationId: updateStudio
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - studio
              properties:
                studio:
                  $ref: "#/components/schemas/StudioUpdateRequest"
            example:
              studio:
                studio_name: Updated Studio
                slug: updated-brand
                phone: "+919999999999"
                color_primary: "#112233"
                color_accent: "#c0ffee"
                font_heading: Lora
                font_body: DM Sans
                logo_url: https://cdn.example.com/logo.png
                watermark_url: https://cdn.example.com/watermark.png
                watermark_opacity: 0.55
      responses:
        "200":
          description: Updated studio profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeSuccessResponse"
              example:
                success: true
                data:
                  id: b3d7cb31-4dae-4faf-9690-5335408926c5
                  email: live-test-20260407@studio.com
                  phone: "+919999999999"
                  plan: free
                  plan_expires_at: null
                  slug: updated-brand
                  studio_name: Updated Studio
                  logo_url: https://cdn.example.com/logo.png
                  color_primary: "#112233"
                  color_accent: "#c0ffee"
                  font_heading: Lora
                  font_body: DM Sans
                  watermark_url: https://cdn.example.com/watermark.png
                  watermark_opacity: "0.55"
        "401":
          description: Missing, invalid, or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                error:
                  message: Unauthorized
                  code: unauthorized
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                error:
                  message: Slug has already been taken
                  code: validation_error

  /api/v1/studio/logo:
    post:
      tags:
        - Studio
      summary: Upload the current studio logo
      operationId: uploadStudioLogo
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Logo uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadAssetResponse"
              example:
                success: true
                data:
                  key: studios/b3d7cb31-4dae-4faf-9690-5335408926c5/logo.svg
                  url: https://cdn.example.com/logo.svg
        "401":
          description: Missing, invalid, or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                error:
                  message: Unauthorized
                  code: unauthorized
        "422":
          description: Invalid upload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                error:
                  message: Unsupported file type
                  code: invalid_upload

  /api/v1/studio/watermark:
    post:
      tags:
        - Studio
      summary: Upload the current studio watermark
      operationId: uploadStudioWatermark
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Watermark uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadAssetResponse"
              example:
                success: true
                data:
                  key: studios/b3d7cb31-4dae-4faf-9690-5335408926c5/watermark.svg
                  url: https://cdn.example.com/watermark.svg
        "401":
          description: Missing, invalid, or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                error:
                  message: Unauthorized
                  code: unauthorized
        "422":
          description: Invalid upload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                error:
                  message: File size must be less than 2MB
                  code: invalid_upload

  /api/v1/weddings:
    get:
      tags:
        - Weddings
      summary: List weddings for the current studio
      operationId: listWeddings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current studio weddings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeddingListResponse"
              example:
                success: true
                data:
                  - id: 7198a507-2045-458f-a306-0bf84ee0d051
                    couple_name: Priya & Arjun Updated
                    wedding_date: "2026-02-15"
                    slug: priya-arjun-updated
                    hero_image_key: studios/a36a59f5-4ba2-4863-b8fd-4ab139e4e7f3/weddings/7198a507-2045-458f-a306-0bf84ee0d051/hero.jpg
                    hero_image_url: https://cdn.example.com/hero.jpg
                    is_active: false
                    expires_at: "2026-12-31T00:00:00.000Z"
                    allow_download: all
                    allow_comments: true
                    total_photos: 0
                    total_videos: 0
                    metadata:
                      location: Mumbai
                    expired: true
                    ceremony_count: 0
                    ceremonies: []
                meta:
                  count: 1
                  page: 1
                  pages: 1
                  total_count: 1
        "401":
          description: Missing, invalid, or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                error:
                  message: Unauthorized
                  code: unauthorized
    post:
      tags:
        - Weddings
      summary: Create a wedding for the current studio
      operationId: createWedding
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - wedding
              properties:
                wedding:
                  $ref: "#/components/schemas/WeddingCreateRequest"
            example:
              wedding:
                couple_name: Priya & Arjun
                wedding_date: "2026-02-15"
                password: priya2026
                expires_at: "2026-03-17T00:00:00Z"
                allow_download: shortlist
                metadata:
                  location: Pune
      responses:
        "201":
          description: Wedding created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeddingResponse"
              example:
                success: true
                data:
                  id: 7198a507-2045-458f-a306-0bf84ee0d051
                  couple_name: Priya & Arjun
                  wedding_date: "2026-02-15"
                  slug: priya-arjun
                  hero_image_key: null
                  hero_image_url: null
                  is_active: true
                  expires_at: "2026-03-17T00:00:00.000Z"
                  allow_download: shortlist
                  allow_comments: true
                  total_photos: 0
                  total_videos: 0
                  metadata:
                    location: Pune
                  expired: true
                  ceremony_count: 0
                  ceremonies: []
        "401":
          description: Missing, invalid, or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                error:
                  message: Unauthorized
                  code: unauthorized
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                error:
                  message: Couple name can't be blank
                  code: validation_error

  /api/v1/weddings/{slug}:
    get:
      tags:
        - Weddings
      summary: Fetch a wedding by slug
      operationId: getWedding
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WeddingSlug"
      responses:
        "200":
          description: Wedding found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeddingResponse"
        "401":
          description: Missing, invalid, or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Wedding not found for current studio
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                error:
                  message: Couldn't find Wedding with [WHERE "weddings"."studio_id" = $1 AND "weddings"."slug" = $2]
                  code: not_found
    patch:
      tags:
        - Weddings
      summary: Update a wedding by slug
      operationId: updateWedding
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WeddingSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - wedding
              properties:
                wedding:
                  $ref: "#/components/schemas/WeddingUpdateRequest"
            example:
              wedding:
                couple_name: Priya & Arjun Updated
                password: updatedpass123
                allow_download: all
                expires_at: "2026-12-31T00:00:00Z"
                metadata:
                  location: Mumbai
      responses:
        "200":
          description: Wedding updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeddingResponse"
        "401":
          description: Missing, invalid, or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Wedding not found for current studio
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags:
        - Weddings
      summary: Soft delete a wedding by slug
      operationId: deleteWedding
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WeddingSlug"
      responses:
        "200":
          description: Wedding soft deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeddingResponse"
        "401":
          description: Missing, invalid, or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Wedding not found for current studio
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/weddings/{slug}/hero:
    post:
      tags:
        - Weddings
      summary: Upload a wedding hero image
      operationId: uploadWeddingHero
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WeddingSlug"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Hero image uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeddingHeroUploadResponse"
              example:
                success: true
                data:
                  key: studios/a36a59f5-4ba2-4863-b8fd-4ab139e4e7f3/weddings/7198a507-2045-458f-a306-0bf84ee0d051/hero.jpg
                  url: https://cdn.example.com/hero.jpg
                  blur_data_url: data:image/jpeg;base64,abc123
        "401":
          description: Missing, invalid, or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Wedding not found for current studio
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Invalid upload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/weddings/{slug}/comments:
    get:
      tags:
        - Comments
      summary: List all wedding comments for the studio
      operationId: weddingComments
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: Wedding comments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudioCommentListResponse"
        "401":
          description: Missing, invalid, or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Wedding not found for current studio
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/weddings/{wedding_slug}/ceremonies:
    get:
      tags:
        - Ceremonies
      summary: List ceremonies for a wedding
      operationId: listCeremonies
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WeddingSlugNested"
      responses:
        "200":
          description: Wedding ceremonies ordered by sort order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CeremonyListResponse"
              example:
                success: true
                data:
                  - id: 4d668e89-335e-4322-aa5a-73eaeb885493
                    name: Mehendi
                    slug: mehendi
                    cover_image_key: null
                    cover_image_url: null
                    description: null
                    sort_order: 0
                    photo_count: 0
                    video_count: 0
                  - id: 4d52c600-5eb3-4fb9-85c7-f8f0e8142d98
                    name: Reception
                    slug: reception
                    cover_image_key: null
                    cover_image_url: null
                    description: Evening celebration
                    sort_order: 1
                    photo_count: 0
                    video_count: 0
        "401":
          description: Missing, invalid, or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Wedding not found for current studio
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags:
        - Ceremonies
      summary: Create a ceremony for a wedding
      operationId: createCeremony
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WeddingSlugNested"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ceremony
              properties:
                ceremony:
                  $ref: "#/components/schemas/CeremonyCreateRequest"
            example:
              ceremony:
                name: Haldi Ceremony
                description: The turmeric ceremony
                sort_order: 2
      responses:
        "201":
          description: Ceremony created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CeremonyResponse"
              example:
                success: true
                data:
                  id: de13af61-d4d7-4e22-99fc-85d870be69a1
                  name: Haldi Ceremony
                  slug: haldi-ceremony
                  cover_image_key: null
                  cover_image_url: null
                  description: The turmeric ceremony
                  sort_order: 2
                  photo_count: 0
                  video_count: 0
        "401":
          description: Missing, invalid, or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Wedding not found for current studio
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/weddings/{wedding_slug}/ceremonies/{slug}:
    get:
      tags:
        - Ceremonies
      summary: Fetch a ceremony by slug
      operationId: getCeremony
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WeddingSlugNested"
        - $ref: "#/components/parameters/CeremonySlug"
      responses:
        "200":
          description: Ceremony found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CeremonyResponse"
        "401":
          description: Missing, invalid, or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Ceremony not found for current studio wedding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags:
        - Ceremonies
      summary: Update a ceremony by slug
      operationId: updateCeremony
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WeddingSlugNested"
        - $ref: "#/components/parameters/CeremonySlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ceremony
              properties:
                ceremony:
                  $ref: "#/components/schemas/CeremonyUpdateRequest"
            example:
              ceremony:
                name: Haldi Updated
                sort_order: 5
      responses:
        "200":
          description: Ceremony updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CeremonyResponse"
        "401":
          description: Missing, invalid, or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Ceremony not found for current studio wedding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags:
        - Ceremonies
      summary: Delete a ceremony by slug
      operationId: deleteCeremony
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WeddingSlugNested"
        - $ref: "#/components/parameters/CeremonySlug"
      responses:
        "200":
          description: Ceremony deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CeremonyDeleteResponse"
              example:
                success: true
                data:
                  id: de13af61-d4d7-4e22-99fc-85d870be69a1
                  deleted: true
        "401":
          description: Missing, invalid, or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Ceremony not found for current studio wedding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/weddings/{wedding_slug}/ceremonies/{slug}/cover:
    post:
      tags:
        - Ceremonies
      summary: Upload a ceremony cover image
      operationId: uploadCeremonyCover
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WeddingSlugNested"
        - $ref: "#/components/parameters/CeremonySlug"
      requestBody:
        required: true
        content:
