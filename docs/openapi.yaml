components:
  parameters:
    WeddingSlug:
      name: slug
      in: path
      required: true
      schema:
        type: string
      example: priya-arjun
    WeddingSlugNested:
      name: wedding_slug
      in: path
      required: true
      schema:
        type: string
      example: aditi-karan
    CeremonySlug:
      name: slug
      in: path
      required: true
      schema:
        type: string
      example: mehendi
    CeremonySlugNested:
      name: ceremony_slug
      in: path
      required: true
      schema:
        type: string
      example: mehendi
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    XGalleryToken:
      name: X-Gallery-Token
      in: header
      required: true
      schema:
        type: string
      description: Session token returned by the gallery password verification endpoint

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok

    Studio:
      type: object
      required:
        - id
        - email
        - studio_name
        - slug
        - plan
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        plan:
          type: string
          example: free
        plan_expires_at:
          type: string
          format: date-time
          nullable: true
        logo_url:
          type: string
          format: uri
          nullable: true
        color_primary:
          type: string
          example: "#1a1a1a"
        color_accent:
          type: string
          example: "#c9a96e"
        font_heading:
          type: string
          example: Playfair Display
        font_body:
          type: string
          example: Inter
        watermark_url:
          type: string
          format: uri
          nullable: true
        watermark_opacity:
          type: string
          example: "0.30"
        slug:
          type: string
          example: my-studio
        studio_name:
          type: string
          example: My Studio

    SignupRequestStudio:
      type: object
      required:
        - email
        - password
        - studio_name
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
        password_confirmation:
          type: string
        studio_name:
          type: string
        phone:
          type: string
          nullable: true

    LoginRequestStudio:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    StudioUpdateRequest:
      type: object
      properties:
        studio_name:
          type: string
        slug:
          type: string
        phone:
          type: string
          nullable: true
        logo_url:
          type: string
          format: uri
        color_primary:
          type: string
          example: "#112233"
        color_accent:
          type: string
          example: "#c0ffee"
        font_heading:
          type: string
          enum:
            - Inter
            - Playfair Display
            - Lora
            - Cormorant Garamond
            - Montserrat
            - Poppins
            - DM Sans
        font_body:
          type: string
          enum:
            - Inter
            - Playfair Display
            - Lora
            - Cormorant Garamond
            - Montserrat
            - Poppins
            - DM Sans
        watermark_url:
          type: string
          format: uri
        watermark_opacity:
          type: number
          minimum: 0
          maximum: 1

    Wedding:
      type: object
      required:
        - id
        - couple_name
        - slug
        - expires_at
        - allow_download
        - allow_comments
        - is_active
        - total_photos
        - total_videos
        - metadata
        - expired
        - ceremony_count
        - ceremonies
      properties:
        id:
          type: string
          format: uuid
        couple_name:
          type: string
          example: Priya & Arjun
        wedding_date:
          type: string
          format: date
          nullable: true
        slug:
          type: string
          example: priya-arjun
        hero_image_key:
          type: string
          nullable: true
        hero_image_url:
          type: string
          format: uri
          nullable: true
        is_active:
          type: boolean
        expires_at:
          type: string
          format: date-time
        allow_download:
          type: string
          enum:
            - none
            - shortlist
            - all
        allow_comments:
          type: boolean
        total_photos:
          type: integer
        total_videos:
          type: integer
        metadata:
          type: object
          additionalProperties: true
        expired:
          type: boolean
        ceremony_count:
          type: integer
        ceremonies:
          type: array
          items:
            $ref: "#/components/schemas/Ceremony"

    Ceremony:
      type: object
      required:
        - id
        - name
        - slug
        - sort_order
        - photo_count
        - video_count
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        cover_image_key:
          type: string
          nullable: true
        cover_image_url:
          type: string
          format: uri
          nullable: true
        description:
          type: string
          nullable: true
        sort_order:
          type: integer
        photo_count:
          type: integer
        video_count:
          type: integer

    StorageConnection:
      type: object
      required:
        - id
        - label
        - provider
        - bucket
        - is_default
        - active
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
        provider:
          type: string
          enum:
            - cloudflare_r2
            - backblaze_b2
        account_id:
          type: string
          nullable: true
        bucket:
          type: string
        region:
          type: string
          nullable: true
        endpoint:
          type: string
          nullable: true
        base_prefix:
          type: string
          nullable: true
        is_default:
          type: boolean
        active:
          type: boolean

    StorageConnectionCreateRequest:
      type: object
      required:
        - label
        - provider
        - bucket
        - access_key
        - secret_key
      properties:
        label:
          type: string
        provider:
          type: string
          enum:
            - cloudflare_r2
            - backblaze_b2
        account_id:
          type: string
        bucket:
          type: string
        region:
          type: string
        endpoint:
          type: string
        access_key:
          type: string
        secret_key:
          type: string
        base_prefix:
          type: string
        is_default:
          type: boolean
        active:
          type: boolean

    StorageConnectionUpdateRequest:
      type: object
      properties:
        label:
          type: string
        account_id:
          type: string
        bucket:
          type: string
        region:
          type: string
        endpoint:
          type: string
        access_key:
          type: string
        secret_key:
          type: string
        base_prefix:
          type: string
        is_default:
          type: boolean
        active:
          type: boolean

    StorageConnectionResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: "#/components/schemas/StorageConnection"

    StorageConnectionListResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: array
          items:
            $ref: "#/components/schemas/StorageConnection"

    UploadBatch:
      type: object
      required:
        - id
        - source_type
        - total_files
        - completed_files
        - failed_files
        - skipped_files
        - status
      properties:
        id:
          type: string
          format: uuid
        source_type:
          type: string
          enum:
            - import
            - direct_upload
        total_files:
          type: integer
        completed_files:
          type: integer
        failed_files:
          type: integer
        skipped_files:
          type: integer
        status:
          type: string
          enum:
            - in_progress
            - completed
            - partial
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UploadBatchResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: "#/components/schemas/UploadBatch"

    Photo:
      type: object
      required:
        - id
        - original_filename
        - file_extension
        - width
        - height
        - aspect_ratio
        - sort_order
        - is_cover
        - ingestion_status
        - processing_status
        - urls
      properties:
        id:
          type: string
          format: uuid
        original_filename:
          type: string
          nullable: true
        file_extension:
          type: string
        width:
          type: integer
        height:
          type: integer
        aspect_ratio:
          type: string
        sort_order:
          type: integer
        is_cover:
          type: boolean
        ingestion_status:
          type: string
          enum:
            - pending_import
            - queued
            - uploading
            - copied
            - failed
        processing_status:
          type: string
          enum:
            - pending
            - processing
            - ready
            - failed
        urls:
          type: object
          additionalProperties: true

    PhotoResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: "#/components/schemas/Photo"

    PhotoListResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: array
          items:
            $ref: "#/components/schemas/Photo"

    PhotoListWithMetaResponse:
      type: object
      required:
        - success
        - data
        - meta
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: array
          items:
            $ref: "#/components/schemas/Photo"
        meta:
          type: object
          properties:
            queued_count:
              type: integer
            skipped_count:
              type: integer
            upload_batch_id:
              type: string
              format: uuid

    PhotoImportFile:
      type: object
      required:
        - source_key
      properties:
        source_key:
          type: string
        filename:
          type: string
        content_type:
          type: string
        byte_size:
          type: integer
        etag:
          type: string

    PhotoImportDiscoverRequest:
      type: object
      required:
        - connection_id
      properties:
        connection_id:
          type: string
          format: uuid
        prefix:
          type: string

    PhotoImportDiscoverResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: object
          properties:
            connection_id:
              type: string
              format: uuid
            provider:
              type: string
            bucket:
              type: string
            prefix:
              type: string
            files:
              type: array
              items:
                $ref: "#/components/schemas/PhotoImportFile"

    PhotoImportRequest:
      type: object
      required:
        - connection_id
        - files
      properties:
        connection_id:
          type: string
          format: uuid
        files:
          type: array
          items:
            $ref: "#/components/schemas/PhotoImportFile"

    PhotoPresignFile:
      type: object
      required:
        - filename
        - content_type
        - byte_size
      properties:
        filename:
          type: string
        content_type:
          type: string
        byte_size:
          type: integer

    PhotoPresignRequest:
      type: object
      required:
        - files
      properties:
        files:
