services:
  - type: web
    name: wedding-gallery-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: ./bin/render-start-web
    autoDeployTrigger: checksPass
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wedding-gallery-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: RAILS_MASTER_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.0"
      - key: STORAGE_PROVIDER
        value: cloudflare_r2
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_REGION
        value: auto
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_PUBLIC_URL
        sync: false
      - key: STORAGE_ACCESS_KEY
        sync: false
      - key: STORAGE_SECRET_KEY
        sync: false
      - key: STORAGE_FORCE_PATH_STYLE
        value: "false"
      - key: STORAGE_PRESIGN_EXPIRY
        value: "3600"
      - key: RAILS_LOG_LEVEL
        value: info
      - key: FORCE_SSL
        value: "true"
      - key: ASSUME_SSL
        value: "true"
      - key: SOLID_QUEUE_IN_PUMA
        value: "false"
  - type: worker
    name: wedding-gallery-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: ./bin/render-start-worker
    autoDeployTrigger: checksPass
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wedding-gallery-db
          property: connectionString
      - key: JWT_SECRET
        fromService:
          type: web
          name: wedding-gallery-api
          envVarKey: JWT_SECRET
      - key: RAILS_MASTER_KEY
        fromService:
          type: web
          name: wedding-gallery-api
          envVarKey: RAILS_MASTER_KEY
      - key: SENTRY_DSN
        fromService:
          type: web
          name: wedding-gallery-api
          envVarKey: SENTRY_DSN
      - key: SENTRY_TRACES_SAMPLE_RATE
        fromService:
          type: web
          name: wedding-gallery-api
          envVarKey: SENTRY_TRACES_SAMPLE_RATE
      - key: STORAGE_PROVIDER
        fromService:
          type: web
          name: wedding-gallery-api
          envVarKey: STORAGE_PROVIDER
      - key: STORAGE_BUCKET
        fromService:
          type: web
          name: wedding-gallery-api
          envVarKey: STORAGE_BUCKET
      - key: STORAGE_REGION
        fromService:
          type: web
          name: wedding-gallery-api
          envVarKey: STORAGE_REGION
      - key: STORAGE_ENDPOINT
        fromService:
          type: web
          name: wedding-gallery-api
          envVarKey: STORAGE_ENDPOINT
      - key: STORAGE_PUBLIC_URL
        fromService:
          type: web
          name: wedding-gallery-api
          envVarKey: STORAGE_PUBLIC_URL
      - key: STORAGE_ACCESS_KEY
        fromService:
          type: web
          name: wedding-gallery-api
          envVarKey: STORAGE_ACCESS_KEY
      - key: STORAGE_SECRET_KEY
        fromService:
          type: web
          name: wedding-gallery-api
          envVarKey: STORAGE_SECRET_KEY
      - key: STORAGE_FORCE_PATH_STYLE
        fromService:
          type: web
          name: wedding-gallery-api
          envVarKey: STORAGE_FORCE_PATH_STYLE
      - key: STORAGE_PRESIGN_EXPIRY
        fromService:
          type: web
          name: wedding-gallery-api
          envVarKey: STORAGE_PRESIGN_EXPIRY
      - key: RAILS_LOG_LEVEL
        fromService:
          type: web
          name: wedding-gallery-api
          envVarKey: RAILS_LOG_LEVEL
databases:
  - name: wedding-gallery-db
    plan: basic-256mb
